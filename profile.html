<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | RoomWala</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <img
                        id="profilePhoto"
                        src="https://ui-avatars.com/api/?name=User&background=0D6EFD&color=fff&size=200"
                        class="rounded-circle mb-3"
                        width="120"
                        height="120"
                        alt="Profile">

                    <h3 id="profileName">Loading...</h3>

                    <span id="profileRole" class="badge bg-primary mb-3">
                        Loading...
                    </span>

                    <hr>

                    <div class="text-start">

                        <p>
                            <strong>Email:</strong><br>
                            <span id="profileEmail">Loading...</span>
                        </p>

                        <p>
                            <strong>Phone:</strong><br>
                            <span id="profilePhone">Not Added</span>
                        </p>

                        <p>
                            <strong>Joined:</strong><br>
                            <span id="profileJoined">Loading...</span>
                        </p>

                    </div>

                    <div class="d-grid gap-2 mt-4">

                        <a href="edit-profile.html" class="btn btn-primary">
                            ✏ Edit Profile
                        </a>

                        <a href="dashboard.html" class="btn btn-outline-secondary">
                            ← Back to Dashboard
                        </a>

                        <button
                            class="btn btn-danger"
                            id="logoutBtn">
                            Logout
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/components.js"></script>

<script type="module" src="js/profile.js"></script>

</body>
</html>
