<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomWala</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .logo-box {
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        .logo {
            font-size: 70px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        p {
            opacity: .9;
            margin-bottom: 30px;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="logo-box">

        <div class="logo">
            🏠
        </div>

        <h1>RoomWala</h1>

        <p>Find Your Perfect Room</p>

        <div class="spinner-border text-light"></div>

    </div>

    <script>
        setTimeout(() => {
            window.location.replace("index.html");
        }, 2500);
    </script>

</body>
