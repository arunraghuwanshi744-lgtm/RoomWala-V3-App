<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Post Room | RoomWala</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

              <div class="card-header bg-primary text-white">

    <h3 id="formTitle" class="mb-0">
        Post New Room
    </h3>

              </div>

                <div class="card-body">
<div id="editNotice" class="alert alert-info d-none">
    You are editing an existing room.
</div>
                    <form id="roomForm">

                        <div class="mb-3">

                            <label class="form-label">
                                Room Title
                            </label>

                            <input
                                type="text"
                                id="title"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                City
                            </label>

                            <input
                                type="text"
                                id="city"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Monthly Rent
                            </label>

                            <input
                                type="number"
                                id="rent"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                id="category"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Category
                                </option>

                                <option>Room</option>

                                <option>PG</option>

                                <option>Flat</option>

                                <option>Hostel</option>

                            </select>

                        </div>

                    <div class="mb-3">

    <label class="form-label">
        Owner Mobile Number
    </label>

    <input
        type="tel"
        id="phone"
        class="form-control"
        placeholder="Enter 10-digit mobile number"
        maxlength="10"
        pattern="[0-9]{10}"
        inputmode="numeric"
        required>

    <div class="form-text">
        This number will be visible to users.
    </div>

                    </div>  
                             <div class="mb-3">

    <label class="form-label">
        Room Image
    </label>

    <input
        type="file"
        id="imageFile"
        class="form-control"
        accept="image/png,image/jpeg,image/jpg,image/webp">

    <div class="form-text">
        Allowed: JPG, JPEG, PNG, WEBP (Max 2 MB)
    </div>

</div>

<div class="mb-3 d-none" id="previewSection">

    <label class="form-label">
        Image Preview
    </label>

    <div class="text-center">

        <img
            id="imagePreview"
            src=""
            alt="Preview"
            class="img-fluid rounded border"
            style="max-height:250px;">

    </div>

</div>

<div class="mb-3 d-none" id="progressSection">

    <label class="form-label">
        Upload Progress
    </label>

    <div class="progress">

        <div
            id="uploadProgress"
            class="progress-bar progress-bar-striped progress-bar-animated"
            role="progressbar"
            style="width:0%;">

            0%

        </div>

    </div>

</div>

<div
    id="uploadStatus"
    class="alert alert-info d-none">
</div>
<!-- Room Facilities -->
<div class="mb-3">

    <label class="form-label fw-bold">
        Room Facilities
    </label>

    <div class="row">

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="Water" id="water">
                <label class="form-check-label" for="water">Water</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="Electricity" id="electricity">
                <label class="form-check-label" for="electricity">Electricity</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="WiFi" id="wifi">
                <label class="form-check-label" for="wifi">WiFi</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="Furniture" id="furniture">
                <label class="form-check-label" for="furniture">Furniture</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="Parking" id="parking">
                <label class="form-check-label" for="parking">Parking</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="Kitchen" id="kitchen">
                <label class="form-check-label" for="kitchen">Kitchen</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="Attached Bathroom" id="bathroom">
                <label class="form-check-label" for="bathroom">Attached Bathroom</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="AC/Cooler" id="ac">
                <label class="form-check-label" for="ac">AC / Cooler</label>
            </div>
        </div>

        <div class="col-md-4 col-6 mb-2">
            <div class="form-check">
                <input class="form-check-input facility" type="checkbox" value="CCTV/Security" id="cctv">
                <label class="form-check-label" for="cctv">CCTV / Security</label>
            </div>
        </div>

    </div>

</div>
                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                id="description"
                                rows="5"
                                class="form-control"
                                required></textarea>

                        </div>

                <button
    type="submit"
    id="submitBtn"
    class="btn btn-primary w-100">

    Post Room

                </button>
                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div id="footer"></div>

<script type="module" src="js/post-room.js"></script>

</body>

</html>
