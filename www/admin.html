<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RoomWala Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">
🏠 RoomWala Admin Panel
</h2>

<hr>

<div id="adminContent" style="display:none;">

<div class="row mt-4">

<div class="col-md-4">
<div class="card p-3 text-center">
<h4>Users</h4>
<h2 id="totalUsers">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
<h4>Rooms</h4>
<h2 id="totalRooms">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
<h4>Pending</h4>
<h2 id="pendingRooms">0</h2>
</div>
</div>

</div>

<div class="mt-5">

<div class="d-flex justify-content-between align-items-center mb-3">

<h3>👥 Users Management</h3>

<input
type="text"
id="searchUser"
class="form-control w-50"
placeholder="Search User...">

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Role</th>
<th>Status</th>

</tr>

</thead>

<tbody id="usersList">

<tr>

<td colspan="5" class="text-center">

Loading Users...

</td>

</tr>

</tbody>

</table>

</div>

</div>
<div class="mt-5">

<div class="d-flex justify-content-between align-items-center mb-3">

<h3>🏠 Rooms Management</h3>

<input
type="text"
id="searchRoom"
class="form-control w-50"
placeholder="Search Room...">

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Title</th>
<th>Location</th>
<th>Rent</th>
<th>Owner</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="roomsList">

<tr>

<td colspan="6" class="text-center">
Loading Rooms...
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import "./js/admin-auth.js";
import "./js/admin-dashboard.js";
import "./js/admin-users.js";
import "./js/admin-rooms.js";

</script>

</div>

</body>

</html>
