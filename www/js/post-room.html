<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Post Room | RoomWala</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

              <div class="card-header bg-primary text-white">

    <h3 id="formTitle" class="mb-0">
        Post New Room
    </h3>

              </div>

                <div class="card-body">
<div id="editNotice" class="alert alert-info d-none">
    You are editing an existing room.
</div>
                    <form id="roomForm">

                        <div class="mb-3">

                            <label class="form-label">
                                Room Title
                            </label>

                            <input
                                type="text"
                                id="title"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                City
                            </label>

                            <input
                                type="text"
                                id="city"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Monthly Rent
                            </label>

                            <input
                                type="number"
                                id="rent"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select
                                id="category"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Category
                                </option>

                                <option>Room</option>

                                <option>PG</option>

                                <option>Flat</option>

                                <option>Hostel</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Image URL
                            </label>

                            <input
                                type="text"
                                id="image"
                                class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                id="description"
                                rows="5"
                                class="form-control"
                                required></textarea>

                        </div>

                <button
    type="submit"
    id="submitBtn"
    class="btn btn-primary w-100">

    Post Room

                </button>
                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div id="footer"></div>

<script type="module" src="js/my-rooms.js"></script>

<script type="module" src="js/post-room.js"></script>

</body>

</html>
